# ─── Global ───────────────────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

# GitHub Container Registry pull secret (créé via kubectl, voir README)
imagePullSecrets:
  - name: ghcr-secret

# ─── Backend ──────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/khalilstout/whatsapp-backend
    tag: latest
    pullPolicy: Always

  replicaCount: 1

  # Port exposed by the Node.js server
  port: 3001

  env:
    NODE_ENV: production
    PORT: "3001"
    PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium

  # /dev/shm size for Chromium (must be a Memory-backed emptyDir)
  shmSize: 1Gi

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  service:
    type: ClusterIP
    port: 3001

  # Liveness / Readiness probes hit /health
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector:
    kubernetes.io/hostname: k3s-master
  tolerations: []
  affinity: {}

# ─── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/khalilstout/whatsapp-frontend
    tag: latest
    pullPolicy: Always

  replicaCount: 1

  port: 80

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  service:
    # ClusterIP since traffic comes through the Ingress/nginx
    type: ClusterIP
    port: 80

  nodeSelector:
    kubernetes.io/hostname: k3s-master
  tolerations: []
  affinity: {}

# ─── Cert-Manager ────────────────────────────────────────────────────────────
certManager:
  enabled: true
  issuer: letsencrypt-prod
  email: khalil@khalil.dedyn.io   # ← remplace par ton email réel

# ─── Ingress ─────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: whatsapp.khalil.dedyn.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: whatsapp-tls-prod

# ─── Cert-Manager ─────────────────────────────────────────────────────────────
certManager:
  enabled: true
  email: "khalil.stout@gmail.com"
  issuer: letsencrypt-prod
