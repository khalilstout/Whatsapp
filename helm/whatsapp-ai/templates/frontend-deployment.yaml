apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "whatsapp-ai.frontend.name" . }}
  labels:
    {{- include "whatsapp-ai.labels" . | nindent 4 }}
    {{- include "whatsapp-ai.frontend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "whatsapp-ai.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "whatsapp-ai.labels" . | nindent 8 }}
        {{- include "whatsapp-ai.frontend.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when nginx ConfigMap changes
        checksum/nginx-config: {{ include (print $.Template.BasePath "/frontend-nginx-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: nginx-config-init
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              DNS=$(awk '/^nameserver/{print $2; exit}' /etc/resolv.conf)
              sed "s/__RESOLVER__/$DNS/" /tmpl/default.conf.tmpl > /etc/nginx/conf.d/default.conf
              echo "Resolver set to: $DNS"
          volumeMounts:
            - name: nginx-config
              mountPath: /tmpl
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "whatsapp-ai.frontend.name" . }}-nginx
        - name: nginx-conf-d
          emptyDir: {}
