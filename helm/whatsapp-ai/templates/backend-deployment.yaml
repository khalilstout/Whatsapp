apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "whatsapp-ai.backend.name" . }}
  labels:
    {{- include "whatsapp-ai.labels" . | nindent 4 }}
    {{- include "whatsapp-ai.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "whatsapp-ai.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "whatsapp-ai.labels" . | nindent 8 }}
        {{- include "whatsapp-ai.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.backend.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.startupProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            # Chromium needs a large /dev/shm — mount a Memory-backed tmpfs
            - name: dshm
              mountPath: /dev/shm
            # Logs directory
            - name: logs
              mountPath: /app/logs
            # Persistent named-session auth data (LocalAuth + registry.json)
            {{- if .Values.persistence.enabled }}
            - name: wwebjs-auth
              mountPath: /app/.wwebjs_auth
            {{- end }}
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.backend.shmSize }}
        - name: logs
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: wwebjs-auth
          persistentVolumeClaim:
            claimName: {{ include "whatsapp-ai.backend.name" . }}-auth
        {{- end }}
