apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "whatsapp-ai.frontend.name" . }}-nginx
  labels:
    {{- include "whatsapp-ai.labels" . | nindent 4 }}
    {{- include "whatsapp-ai.frontend.selectorLabels" . | nindent 4 }}
data:
  default.conf.tmpl: |
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # __RESOLVER__ est remplacé au démarrage du container par l'IP de
        # CoreDNS lue depuis /etc/resolv.conf (awk sur le nameserver).
        # La variable $backend diffère la résolution DNS à chaque requête.
        resolver __RESOLVER__ valid=30s ipv6=off;
        set $backend "http://{{ include "whatsapp-ai.backend.name" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.service.port }}";

        location /socket.io/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }

        location /api/ {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
